<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🔍 Lost & Found | Blue & White Edition</title>
    <script src="https://unpkg.com/parse@5.3.0/dist/parse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e88e5;
            --primary-dark: #0d47a1;
            --primary-light: #64b5f6;
            --accent: #039be5;
            --bg-light: #f0f4fa;
            --card-bg: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a627a;
            --border-light: #dce5f0;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* animated background pattern (light) */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(30,136,229,0.03) 0px, rgba(30,136,229,0.03) 2px, transparent 2px, transparent 10px);
            animation: slowSpin 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* main app container */
        .app-container {
            width: 100%;
            max-width: 580px;
            height: 90vh;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(30,136,229,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* geometric header – blue gradient */
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: linear-gradient(125deg, var(--primary), var(--primary-dark));
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0 95%);
            z-index: 0;
            opacity: 0.95;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            padding: 28px 22px 35px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 2;
            scroll-behavior: smooth;
        }

        .page.hidden {
            display: none !important;
        }

        /* ========= BLUE TRIANGLE CURTAIN ========= */
        .triangle-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            pointer-events: none;
            overflow: hidden;
            visibility: hidden;
        }
        .triangle-curtain.active {
            visibility: visible;
            pointer-events: auto;
        }
        .triangle {
            position: absolute;
            transition: transform 2.2s cubic-bezier(0.65, 0, 0.35, 1);
            will-change: transform;
        }
        /* Left triangle – deep blue */
        .triangle-1 {
            top: -20%;
            left: -50%;
            width: 150%;
            height: 140%;
            background: #0d47a1;
            clip-path: polygon(0 0, 100% 0, 0 100%);
            transform: translateX(-100%);
        }
        /* Right triangle – lighter blue */
        .triangle-2 {
            top: -20%;
            right: -50%;
            width: 150%;
            height: 140%;
            background: #1976d2;
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            transform: translateX(100%);
        }
        /* decorative small triangles – white/blue accents */
        .triangle-4, .triangle-5, .triangle-6 {
            width: 100px;
            height: 100px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0;
            transform: scale(0);
            transition: transform 1.2s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 1s ease;
        }
        .triangle-4 { bottom: 5%; left: 5%; background: rgba(30,136,229,0.5); }
        .triangle-5 { top: 10%; right: 8%; width: 140px; height: 140px; background: rgba(100,181,246,0.5); }
        .triangle-6 { bottom: 15%; right: 15%; width: 70px; height: 70px; background: rgba(255,255,255,0.6); }

        /* COVER STATE – slide inward */
        .triangle-curtain.cover .triangle-1 {
            transform: translateX(15%);
            transition-delay: 0s;
        }
        .triangle-curtain.cover .triangle-2 {
            transform: translateX(-15%);
            transition-delay: 0.1s;
        }
        .triangle-curtain.cover .triangle-4,
        .triangle-curtain.cover .triangle-5,
        .triangle-curtain.cover .triangle-6 {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            transition-delay: 0.3s;
        }

        /* SLIDEOUT STATE – slide outward */
        .triangle-curtain.slideout .triangle-1 {
            transform: translateX(-150%);
            transition-delay: 0s;
        }
        .triangle-curtain.slideout .triangle-2 {
            transform: translateX(150%);
            transition-delay: 0.05s;
        }
        .triangle-curtain.slideout .triangle-4,
        .triangle-curtain.slideout .triangle-5,
        .triangle-curtain.slideout .triangle-6 {
            transform: scale(0) rotate(30deg);
            opacity: 0;
            transition-delay: 0.1s;
        }

        /* ========= UI ELEMENTS – BLUE & WHITE ========= */
        h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #0d47a1, #1e88e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        button {
            background: linear-gradient(95deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 28px;
            color: white;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0.3px;
            transition: transform 0.1s ease, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(13, 71, 161, 0.2);
        }
        button:active { transform: scale(0.97); }
        .verify-btn {
            background: linear-gradient(95deg, #e53935, #b71c1c);
            color: white;
        }
        input, select, textarea {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid var(--border-light);
            border-radius: 28px;
            background: white;
            color: var(--text-dark);
            font-size: 15px;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(30,136,229,0.2);
        }
        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        .verify-popup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .verify-popup.hidden { display: none; }
        .popup-content {
            background: white;
            border-radius: 48px 24px 48px 24px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .contact-info {
            background: #e3f2fd;
            border-left: 8px solid var(--primary);
            padding: 12px;
            border-radius: 20px;
            margin-top: 8px;
            color: var(--primary-dark);
        }
        .dino-game-wrapper {
            background: #f8fafc;
            border-radius: 40px;
            padding: 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 6px 12px rgba(0,0,0,0.03);
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 0 0 2px var(--primary-light);
            background: white;
        }
        a, .small-btn {
            color: var(--primary);
        }
        .small-btn {
            background: #eef2fa;
            border: none;
            box-shadow: none;
            color: var(--primary-dark);
        }
        #authMessage, #foundMessage, #verifyMessage {
            color: #d32f2f;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page">
        <h2>🔐 WELCOME</h2>
        <div id="loginForm" style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="signInBtn">SIGN IN</button>
            <button id="showSignUpBtn" style="background:#cfdfed; color:#0d47a1;">CREATE ACCOUNT</button>
        </div>
        <div id="signUpForm" class="hidden" style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="signUpUsername" placeholder="Username">
            <input type="password" id="signUpPassword" placeholder="Password">
            <button id="signUpSubmitBtn">SIGN UP</button>
            <button id="showLoginBtn" style="background:#cfdfed; color:#0d47a1;">BACK</button>
        </div>
        <p id="authMessage" style="color:#d32f2f; text-align:center;"></p>
    </div>

    <!-- HOME PAGE -->
    <div id="homePage" class="page hidden">
        <h2>🏠 DASHBOARD</h2>
        <p>Welcome, <strong id="displayUsername" style="color:#0d47a1;">...</strong>!</p>
        <button id="goLostBtn">🔎 LOST SOMETHING?</button>
        <button id="goFoundBtn">📦 I FOUND AN ITEM</button>
        <button id="goDinoGameBtn">🦖 DINO JUMP</button>
        <button id="logoutFromHomeBtn" style="background:#b0bec5; color:#1a2a3a;">🚪 LOG OUT</button>
    </div>

    <!-- LOST PAGE -->
    <div id="lostPage" class="page hidden">
        <h2>🔎 SEARCH LOST</h2>
        <div style="display:flex; gap:12px;">
            <input type="text" id="lostSearchInput" placeholder="Search...">
            <button id="searchLostBtn" style="flex:0 0 auto;">FILTER</button>
        </div>
        <div id="lostResults" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:16px;"></div>
        <button id="backToHomeFromLost" style="background:#cfdfed; color:#0d47a1;">⬅ BACK</button>
    </div>

    <!-- FOUND PAGE -->
    <div id="foundPage" class="page hidden">
        <h2>📦 REPORT FOUND</h2>
        <select id="foundType">
            <option value="electronic">📱 Electronic</option>
            <option value="personal">🎒 Personal</option>
            <option value="clothing">👕 Clothing</option>
            <option value="documents">🪪 Documents</option>
            <option value="keys">🔑 Keys</option>
            <option value="bags">👜 Bags</option>
            <option value="other">📌 Other</option>
        </select>
        <input type="text" id="foundColor" placeholder="Color">
        <input type="text" id="foundModel" placeholder="Model/Brand">
        <input type="text" id="foundAppearance" placeholder="Appearance">
        <textarea id="foundDescription" placeholder="Description" rows="2"></textarea>
        <input type="datetime-local" id="foundTime">
        <input type="text" id="foundLocation" placeholder="Location">
        <div><label style="color:#0d47a1; font-weight:500;">🔐 Verification</label><input type="text" id="foundVeriQuestion" placeholder="Question"><input type="text" id="foundVeriAnswer" placeholder="Answer"></div>
        <input type="text" id="foundContactInfo" placeholder="Contact (optional)">
        <input type="file" id="foundPhoto" accept="image/*">
        <button id="submitFoundBtn">SUBMIT</button>
        <button id="backToHomeFromFound" style="background:#cfdfed; color:#0d47a1;">⬅ BACK</button>
        <p id="foundMessage"></p>
    </div>

    <!-- DINO GAME PAGE -->
    <div id="dinoGamePage" class="page hidden">
        <h2>🦖 DINO JUMP</h2>
        <div class="dino-game-wrapper">
            <div style="display:flex; justify-content:space-between;"><span>🏆 HI <span id="dhi">0</span></span><span>⭐ <span id="dsc">0</span></span></div>
            <canvas id="dc" width="700" height="130"></canvas>
            <p id="dm" style="text-align:center;">PRESS SPACE / TAP</p>
        </div>
        <button id="backToHomeFromGame" style="background:#cfdfed; color:#0d47a1;">⬅ BACK</button>
    </div>
</div>

<!-- TRIANGLE CURTAIN (blue shades) -->
<div id="triangleCurtain" class="triangle-curtain">
    <div class="triangle triangle-1"></div>
    <div class="triangle triangle-2"></div>
    <div class="triangle triangle-4"></div>
    <div class="triangle triangle-5"></div>
    <div class="triangle triangle-6"></div>
</div>

<!-- VERIFY POPUP -->
<div id="verifyPopup" class="verify-popup hidden">
    <div class="popup-content">
        <h3 style="color:#0d47a1;">🔐 VERIFICATION</h3>
        <p id="verifyQuestionText"></p>
        <input type="text" id="verifyAnswerInput" placeholder="Your answer">
        <button id="submitVerifyBtn">CONFIRM</button>
        <button id="cancelVerifyBtn" style="background:#cfdfed; color:#0d47a1;">CANCEL</button>
        <p id="verifyMessage"></p>
    </div>
</div>

<script src="backend.js"></script>
<script src="login.js"></script>
<script>
    (function() {
        // ========== TRIANGLE TRANSITION ==========
        const curtain = document.getElementById('triangleCurtain');
        let isAnimating = false;
        let pendingCallback = null;

        function runTriangleTransition(callback) {
            if (isAnimating) {
                pendingCallback = callback;
                return;
            }
            isAnimating = true;
            curtain.classList.remove('cover', 'slideout', 'active');
            void curtain.offsetWidth;
            curtain.classList.add('active', 'cover');
            setTimeout(() => {
                curtain.classList.remove('cover');
                curtain.classList.add('slideout');
                setTimeout(() => {
                    curtain.classList.remove('active', 'slideout');
                    isAnimating = false;
                    if (callback) callback();
                    if (pendingCallback) {
                        const cb = pendingCallback;
                        pendingCallback = null;
                        runTriangleTransition(cb);
                    }
                }, 2200);
            }, 2200);
        }

        // ========== PAGE NAVIGATION ==========
        const loginPage = document.getElementById('loginPage');
        const homePage = document.getElementById('homePage');
        const lostPage = document.getElementById('lostPage');
        const foundPage = document.getElementById('foundPage');
        const dinoGamePage = document.getElementById('dinoGamePage');
        const allPages = [loginPage, homePage, lostPage, foundPage, dinoGamePage];

        function showPage(targetPage, extraLoadCallback) {
            if (targetPage.classList.contains('hidden') === false) return;
            runTriangleTransition(() => {
                allPages.forEach(p => p.classList.add('hidden'));
                targetPage.classList.remove('hidden');
                if (extraLoadCallback) extraLoadCallback();
                targetPage.scrollTop = 0;
                if (targetPage !== dinoGamePage && typeof window.stopDinoGame === 'function') {
                    window.stopDinoGame();
                }
            });
        }

        // ========== AUTH ==========
        function checkSession() {
            if (auth.getCurrentUser()) {
                document.getElementById('displayUsername').innerText = auth.getCurrentUser().getUsername();
                showPage(homePage);
            } else {
                showPage(loginPage);
            }
        }

        document.getElementById('signInBtn').addEventListener('click', async () => {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value;
            if (!u || !p) return;
            try {
                await auth.logIn(u, p);
                checkSession();
            } catch(e) { document.getElementById('authMessage').innerText = e.message; }
        });
        document.getElementById('signUpSubmitBtn').addEventListener('click', async () => {
            const u = document.getElementById('signUpUsername').value.trim();
            const p = document.getElementById('signUpPassword').value;
            if (!u || !p) return;
            try {
                await auth.signUp(u, p);
                checkSession();
            } catch(e) { document.getElementById('authMessage').innerText = e.message; }
        });
        document.getElementById('showSignUpBtn').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signUpForm').classList.remove('hidden');
        });
        document.getElementById('showLoginBtn').addEventListener('click', () => {
            document.getElementById('signUpForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        });

        // Navigation buttons
        document.getElementById('goLostBtn').addEventListener('click', () => showPage(lostPage, () => loadLostItems('')));
        document.getElementById('goFoundBtn').addEventListener('click', () => showPage(foundPage));
        document.getElementById('goDinoGameBtn').addEventListener('click', () => showPage(dinoGamePage));
        document.getElementById('logoutFromHomeBtn').addEventListener('click', async () => {
            await auth.logOut();
            checkSession();
        });
        document.getElementById('backToHomeFromLost').addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromFound').addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromGame').addEventListener('click', () => showPage(homePage));
        document.getElementById('searchLostBtn').addEventListener('click', () => loadLostItems(document.getElementById('lostSearchInput').value));

        // ========== LOST ITEMS ==========
        async function loadLostItems(searchTerm) {
            const container = document.getElementById('lostResults');
            container.innerHTML = '<p>🌀 LOADING...</p>';
            try {
                const items = await searchLostItems(searchTerm);
                if (items.length === 0) { container.innerHTML = '<p>No items found.</p>'; return; }
                container.innerHTML = items.map(item => {
                    const type = item.get('type');
                    const emojiMap = { electronic:'📱', personal:'🎒', clothing:'👕', documents:'🪪', keys:'🔑', bags:'👜' };
                    const emoji = emojiMap[type] || '📌';
                    const photo = item.get('photo');
                    const photoUrl = photo ? photo.url() : null;
                    const contact = item.get('contactInfo') || '';
                    return `<div class="card">
                        <div style="display:flex; justify-content:space-between;"><span><strong>${emoji} ${type}</strong></span><span>${new Date(item.get('timeFound')).toLocaleDateString()}</span></div>
                        <div>🎨 ${item.get('color')} · 🏷️ ${item.get('model')}</div>
                        <div>✨ ${item.get('appearance')}</div>
                        <div>📍 ${item.get('locationFound')}</div>
                        ${photoUrl ? `<img src="${photoUrl}" style="max-width:100%; border-radius:16px; margin-top:8px;">` : ''}
                        <button class="verify-btn" data-id="${item.id}">🔐 VERIFY</button>
                        <button class="small-btn forgot-btn" data-contact="${contact.replace(/"/g, '&quot;')}">❓ DETAILS</button>
                        <div class="contact-info hidden" id="contact-${item.id}">${contact ? '📞 ' + contact : 'No contact'}</div>
                    </div>`;
                }).join('');
                document.querySelectorAll('.verify-btn').forEach(btn => btn.addEventListener('click', (e) => openVerifyPopup(e.target.dataset.id)));
                document.querySelectorAll('.forgot-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const id = e.target.closest('.card').querySelector('.verify-btn').dataset.id;
                    document.getElementById(`contact-${id}`).classList.toggle('hidden');
                }));
            } catch(e) { container.innerHTML = '<p>Error loading items.</p>'; }
        }

        // ========== VERIFICATION ==========
        const verifyPopup = document.getElementById('verifyPopup');
        let currentItemId = null;
        async function openVerifyPopup(itemId) {
            currentItemId = itemId;
            const question = await getVerificationQuestion(itemId);
            document.getElementById('verifyQuestionText').innerText = question || 'Verification question';
            document.getElementById('verifyAnswerInput').value = '';
            verifyPopup.classList.remove('hidden');
        }
        document.getElementById('submitVerifyBtn').addEventListener('click', async () => {
            const ans = document.getElementById('verifyAnswerInput').value.trim();
            if (!ans) return;
            const result = await verifyItem(currentItemId, ans);
            document.getElementById('verifyMessage').innerText = result.message;
            if (result.success) {
                setTimeout(() => {
                    verifyPopup.classList.add('hidden');
                    loadLostItems(document.getElementById('lostSearchInput').value);
                }, 1000);
            }
        });
        document.getElementById('cancelVerifyBtn').addEventListener('click', () => verifyPopup.classList.add('hidden'));

        // ========== FOUND ITEM SUBMIT ==========
        document.getElementById('submitFoundBtn').addEventListener('click', async () => {
            const type = document.getElementById('foundType').value;
            const color = document.getElementById('foundColor').value.trim();
            const model = document.getElementById('foundModel').value.trim();
            const appearance = document.getElementById('foundAppearance').value.trim();
            const description = document.getElementById('foundDescription').value.trim();
            const time = document.getElementById('foundTime').value;
            const location = document.getElementById('foundLocation').value.trim();
            const veriQ = document.getElementById('foundVeriQuestion').value.trim();
            const veriA = document.getElementById('foundVeriAnswer').value.trim();
            const contactInfo = document.getElementById('foundContactInfo').value.trim();
            const photoFile = document.getElementById('foundPhoto').files[0];
            if (!color || !model || !time || !location || !veriQ || !veriA) {
                document.getElementById('foundMessage').innerText = 'Fill required fields.';
                return;
            }
            await createFoundItem({
                type, color, model, appearance, description,
                timeFound: new Date(time), locationFound: location,
                verificationQuestion: veriQ, verificationAnswer: veriA,
                contactInfo, photoFile, photoName: photoFile?.name
            });
            document.getElementById('foundMessage').innerText = 'Item posted!';
            setTimeout(() => document.getElementById('foundMessage').innerText = '', 2000);
            document.getElementById('foundColor').value = '';
            document.getElementById('foundModel').value = '';
            document.getElementById('foundAppearance').value = '';
            document.getElementById('foundDescription').value = '';
            document.getElementById('foundLocation').value = '';
            document.getElementById('foundVeriAnswer').value = '';
            document.getElementById('foundContactInfo').value = '';
            document.getElementById('foundPhoto').value = '';
        });

        // ========== DINO GAME ==========
        (function initDino() {
            const cv = document.getElementById('dc');
            if (!cv) return;
            const ctx = cv.getContext('2d');
            const scEl = document.getElementById('dsc'), hiEl = document.getElementById('dhi');
            const msgP = document.getElementById('dm');
            const W = 700, H = 130, GR = 100;
            let d, ca, sc, hi = 0, spd, st, lt, fs, raf;
            function reset() { d = { x: 60, y: GR, w: 22, h: 26, vy: 0, jmp: false, fr: 0, ft: 0 }; ca = []; sc = 0; fs = 0; spd = 4; st = 'idle'; lt = null; }
            function jump() { if (st === 'idle' || st === 'dead') start(); else if (!d.jmp) { d.vy = -11; d.jmp = true; } }
            function start() { st = 'running'; d.jmp = false; d.vy = 0; d.y = GR; ca = []; sc = 0; fs = 0; spd = 4; if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(loop); }
            function loop(ts) {
                if (document.getElementById('dinoGamePage').classList.contains('hidden')) { if (raf) cancelAnimationFrame(raf); st = 'idle'; msgP.innerText = 'PRESS SPACE / TAP'; return; }
                if (!lt) lt = ts;
                let dt = Math.min((ts - lt) / 16.67, 3);
                lt = ts;
                ctx.clearRect(0, 0, W, H);
                d.vy += 0.6 * dt;
                d.y += d.vy * dt;
                if (d.y >= GR) { d.y = GR; d.vy = 0; d.jmp = false; }
                d.ft += dt;
                if (d.ft > 8) { d.fr++; d.ft = 0; }
                fs += dt;
                if (fs >= 5) { sc += Math.floor(fs / 5); fs %= 5; }
                spd = 4 + sc * 0.012;
                if (Math.random() < 0.012 * dt && (ca.length === 0 || ca[ca.length - 1].x < W - 180)) {
                    const h = 20 + Math.random() * 22, w = 10 + Math.random() * 8;
                    ca.push({ x: W, w, h, y: GR + 26 - h });
                }
                for (let i = ca.length - 1; i >= 0; i--) {
                    ca[i].x -= spd * dt;
                    if (ca[i].x + ca[i].w < 0) { ca.splice(i, 1); continue; }
                    if (d.x + d.w - 4 > ca[i].x + 2 && d.x + 4 < ca[i].x + ca[i].w - 2 && d.y + d.h > ca[i].y + 2) {
                        if (sc > hi) { hi = sc; hiEl.innerText = hi; }
                        scEl.innerText = sc;
                        st = 'dead';
                        msgP.innerText = 'GAME OVER';
                        raf = null;
                        return;
                    }
                    ctx.fillStyle = '#1e88e5';
                    ctx.fillRect(ca[i].x, ca[i].y, ca[i].w, ca[i].h);
                }
                ctx.fillStyle = '#1e88e5';
                ctx.fillRect(d.x, d.y, d.w, d.h);
                ctx.fillRect(d.x + d.w - 6, d.y - 6, 10, 8);
                ctx.fillStyle = '#fff';
                ctx.fillRect(d.x + d.w + 1, d.y - 5, 3, 3);
                ctx.fillStyle = '#1e88e5';
                if (!d.jmp) {
                    ctx.fillRect(d.x + 4, d.y + d.h, 5, 8);
                    ctx.fillRect(d.x + 12, d.y + d.h, 5, d.fr % 2 ? 8 : 4);
                } else {
                    ctx.fillRect(d.x + 4, d.y + d.h, 5, 6);
                    ctx.fillRect(d.x + 12, d.y + d.h, 5, 6);
                }
                ctx.fillRect(d.x - 6, d.y + 8, 8, 4);
                scEl.innerText = sc;
                raf = requestAnimationFrame(loop);
            }
            reset();
            document.addEventListener('keydown', e => { if (e.code === 'Space' && !document.getElementById('dinoGamePage').classList.contains('hidden')) { e.preventDefault(); jump(); } });
            cv.addEventListener('click', jump);
            window.stopDinoGame = () => { if (raf) cancelAnimationFrame(raf); st = 'idle'; msgP.innerText = 'PRESS SPACE / TAP'; };
        })();

        checkSession();
    })();
</script>
