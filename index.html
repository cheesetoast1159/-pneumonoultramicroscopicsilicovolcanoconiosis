<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🔍 Lost & Found | Triangle Transition</title>
    <script src="https://unpkg.com/parse@5.3.0/dist/parse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #16222e, #0f1a24);
            --card-bg: rgba(20, 28, 38, 0.92);
            --primary: #f39c12;
            --primary-dark: #e67e22;
            --primary-light: #f1c40f;
            --accent: #e74c3c;
            --text: #f5f7fa;
            --text-light: #b0c4de;
            --border: rgba(243,156,18,0.3);
            --shadow-lg: 0 25px 45px rgba(0,0,0,0.7);
            --radius-card: 28px;
            --radius-button: 20px;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0f16;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(243,156,18,0.03) 0px, rgba(243,156,18,0.03) 3px, transparent 3px, transparent 12px),
                        radial-gradient(circle at 70% 20%, rgba(231,76,60,0.15) 0%, rgba(0,0,0,0) 60%);
            animation: slowSpin 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* main app container */
        .app-container {
            width: 100%;
            max-width: 580px;
            height: 90vh;
            max-height: 850px;
            background: rgba(10, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(243,156,18,0.3) inset;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* geometric header */
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: linear-gradient(125deg, var(--primary), var(--accent));
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0 95%);
            z-index: 0;
            opacity: 0.9;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            padding: 28px 22px 35px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 2;
            scroll-behavior: smooth;
        }

        .page.hidden {
            display: none !important;
        }

        /* TRIANGLE LOADING CURTAIN */
        .triangle-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            pointer-events: none;
            overflow: hidden;
            visibility: hidden;
        }
        .triangle-curtain.active {
            visibility: visible;
            pointer-events: auto;
        }
        .triangle {
            position: absolute;
            width: 0;
            height: 0;
            background: transparent;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.8s ease;
            will-change: transform;
        }
        /* Each triangle defined with clip-path and background */
        .triangle-1 { top: 0; left: 0; width: 100%; height: 100%; background: #1a1f2c; clip-path: polygon(0 0, 100% 0, 0 100%); transform: translateX(-100%); }
        .triangle-2 { top: 0; right: 0; width: 100%; height: 100%; background: #2c2f3a; clip-path: polygon(100% 0, 100% 100%, 0 100%); transform: translateX(100%); }
        .triangle-3 { top: 50%; left: 50%; width: 120%; height: 120%; background: #f39c12; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform: translate(-50%, -50%) scale(0); opacity: 0; border-radius: 0; }
        
        /* Additional smaller triangles for flair */
        .triangle-4, .triangle-5, .triangle-6 {
            background: rgba(243,156,18,0.3);
            width: 80px;
            height: 80px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            transition: transform 1s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.6s;
        }
        .triangle-4 { bottom: 10%; left: 5%; transform: rotate(15deg) scale(0); }
        .triangle-5 { top: 15%; right: 8%; transform: rotate(-25deg) scale(0); width: 120px; height: 120px; background: rgba(231,76,60,0.4);}
        .triangle-6 { bottom: 20%; right: 20%; transform: rotate(45deg) scale(0); width: 60px; height: 60px; background: rgba(241,196,15,0.5);}

        /* Animation states: cover */
        .triangle-curtain.cover .triangle-1 { transform: translateX(0); transition-delay: 0s; }
        .triangle-curtain.cover .triangle-2 { transform: translateX(0); transition-delay: 0.1s; }
        .triangle-curtain.cover .triangle-3 { transform: translate(-50%, -50%) scale(2); opacity: 1; transition-delay: 0.2s; }
        .triangle-curtain.cover .triangle-4, 
        .triangle-curtain.cover .triangle-5,
        .triangle-curtain.cover .triangle-6 { transform: rotate(0deg) scale(1); opacity: 1; transition-delay: 0.3s; }

        /* Animation states: slide out */
        .triangle-curtain.slideout .triangle-1 { transform: translateX(-150%); transition-delay: 0s; }
        .triangle-curtain.slideout .triangle-2 { transform: translateX(150%); transition-delay: 0.05s; }
        .triangle-curtain.slideout .triangle-3 { transform: translate(-50%, -50%) scale(0); opacity: 0; transition-delay: 0.1s; }
        .triangle-curtain.slideout .triangle-4,
        .triangle-curtain.slideout .triangle-5,
        .triangle-curtain.slideout .triangle-6 { transform: scale(0) rotate(30deg); opacity: 0; transition-delay: 0.15s; }

        /* other existing styles (buttons, cards, etc) */
        h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .card {
            background: rgba(25, 35, 50, 0.85);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(243,156,18,0.4);
            transition: all 0.3s ease;
        }
        .card:hover { transform: scale(1.01) translateY(-5px); border-color: var(--primary); }
        button {
            background: linear-gradient(95deg, var(--primary-dark), var(--primary));
            border: none;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 16px;
            border-radius: var(--radius-button);
            color: #0a0f16;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }
        button:active { transform: scale(0.96); }
        .verify-btn { background: linear-gradient(95deg, #e74c3c, #c0392b); color: white; }
        input, select, textarea {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid rgba(243,156,18,0.3);
            border-radius: 24px;
            background: rgba(0,0,0,0.6);
            color: white;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(243,156,18,0.3); }
        .verify-popup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .verify-popup.hidden { display: none; }
        .popup-content {
            background: #1a1f2c;
            border-radius: 56px 24px 56px 24px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            border: 2px solid #f39c12;
        }
        .contact-info {
            background: #2c1e0f;
            border-left: 8px solid #f39c12;
            padding: 12px;
            border-radius: 20px;
            margin-top: 8px;
        }
        .dino-game-wrapper {
            background: #000000aa;
            border-radius: 40px;
            padding: 20px;
        }
        canvas { border-radius: 20px; box-shadow: 0 0 0 2px #f39c12; }
        @media (max-width: 480px) {
            .page { padding: 20px 16px; }
            h2 { font-size: 26px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- pages same as before -->
    <div id="loginPage" class="page">
        <h2>🔥 WELCOME</h2>
        <div id="loginForm" style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="signInBtn">SIGN IN</button>
            <button id="showSignUpBtn" style="background:#3a546d;">CREATE ACCOUNT</button>
        </div>

    <div id="lostPage" class="page hidden">
        <h2>🔎 SEARCH LOST</h2>
        <div style="display:flex; gap:12px;">

            <button id="searchLostBtn">FILTER</button>
        </div>

    <div id="foundPage" class="page hidden">
        <h2>📦 REPORT FOUND</h2>
        <select id="foundType"><option value="electronic">📱 Electronic</option><option value="personal">🎒 Personal</option><option value="clothing">👕 Clothing</option><option value="documents">🪪 Documents</option><option value="keys">🔑 Keys</option><option value="bags">👜 Bags</option><option value="other">📌 Other</option></select>
        <input type="text" id="foundColor" placeholder="Color">
        <input type="text" id="foundModel" placeholder="Model/Brand">
        <input type="text" id="foundAppearance" placeholder="Appearance">
        <textarea id="foundDescription" placeholder="Description" rows="2"></textarea>
        <input type="datetime-local" id="foundTime">

</div>

<!-- TRIANGLE LOADING CURTAIN -->
<div id="triangleCurtain" class="triangle-curtain">
    <div class="triangle triangle-1"></div>
    <div class="triangle triangle-2"></div>
    <div class="triangle triangle-3"></div>
    <div class="triangle triangle-4"></div>
    <div class="triangle triangle-5"></div>
    <div class="triangle triangle-6"></div>
</div>

<script src="backend.js"></script>
<script src="login.js"></script>
<script>
    // ==================== TRIANGLE ANIMATION CONTROLLER ====================
    const curtain = document.getElementById('triangleCurtain');
    let isAnimating = false;
    let pendingTransition = null;

    function runTriangleTransition(callback) {
        if (isAnimating) {
            pendingTransition = callback;
            return;
        }
        isAnimating = true;
        // reset classes
        curtain.classList.remove('cover', 'slideout');
        // force reflow
        void curtain.offsetWidth;
        curtain.classList.add('active', 'cover');
        // after cover animation completes, start slideout
        setTimeout(() => {
            curtain.classList.remove('cover');
            curtain.classList.add('slideout');
            setTimeout(() => {
                curtain.classList.remove('active', 'slideout');
                isAnimating = false;
                if (callback) callback();
                if (pendingTransition) {
                    const cb = pendingTransition;
                    pendingTransition = null;
                    runTriangleTransition(cb);
                }
            }, 800); // slideout duration
        }, 600); // cover duration
    }

    // Override showPage to use triangle transition
    const originalShowPage = (function() {
        // will be defined after pages
        let pagesMap = {};
        return function showPageWithTransition(pageId) {
            const allPages = ['loginPage', 'homePage', 'lostPage', 'foundPage', 'dinoGamePage'];
            const targetPage = document.getElementById(pageId);
            if (!targetPage || !targetPage.classList.contains('hidden')) {
                if (!targetPage.classList.contains('hidden')) return;
            }
            runTriangleTransition(() => {
                allPages.forEach(id => {
                    const pg = document.getElementById(id);
                    if (pg) pg.classList.add('hidden');
                });
                targetPage.classList.remove('hidden');
                // additional load logic if needed (lost items)
                if (pageId === 'lostPage') loadLostItems('');
                targetPage.scrollTop = 0;
            });
        };
    })();

    // attach to global navigation
    let currentShowPage = null;

    // Setup after DOM
    document.addEventListener('DOMContentLoaded', () => {
        // define pages
        const loginPage = document.getElementById('loginPage');
        const homePage = document.getElementById('homePage');
        const lostPage = document.getElementById('lostPage');
        const foundPage = document.getElementById('foundPage');
        const dinoGamePage = document.getElementById('dinoGamePage');
        
        function showPage(pageElement) {
            const pageId = pageElement.id;
            const allPages = [loginPage, homePage, lostPage, foundPage, dinoGamePage];
            if (pageElement.classList.contains('hidden') === false) return;
            runTriangleTransition(() => {
                allPages.forEach(p => p.classList.add('hidden'));
                pageElement.classList.remove('hidden');
                if (pageId === 'lostPage') loadLostItems('');
                pageElement.scrollTop = 0;
            });
        }

        // auth check
        function checkSession() {
            if (auth.getCurrentUser()) {
                document.getElementById('displayUsername').innerText = auth.getCurrentUser().getUsername();
                showPage(homePage);
            } else {
                showPage(loginPage);
            }
        }

        // Login / Signup
        document.getElementById('signInBtn').addEventListener('click', async () => {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value;
            if (!u || !p) return;
            try {
                await auth.logIn(u, p);
                checkSession();
            } catch(e) { document.getElementById('authMessage').innerText = e.message; }
        });
        document.getElementById('signUpSubmitBtn').addEventListener('click', async () => {
            const u = document.getElementById('signUpUsername').value.trim();
            const p = document.getElementById('signUpPassword').value;
            if (!u || !p) return;
            try {
                await auth.signUp(u, p);
                checkSession();
            } catch(e) { document.getElementById('authMessage').innerText = e.message; }
        });
        document.getElementById('showSignUpBtn').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signUpForm').classList.remove('hidden');
        });
        document.getElementById('showLoginBtn').addEventListener('click', () => {
            document.getElementById('signUpForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        });

        // Navigation
        document.getElementById('goLostBtn').addEventListener('click', () => showPage(lostPage));
        document.getElementById('goFoundBtn').addEventListener('click', () => showPage(foundPage));
        document.getElementById('goDinoGameBtn').addEventListener('click', () => showPage(dinoGamePage));
        document.getElementById('logoutFromHomeBtn').addEventListener('click', async () => { await auth.logOut(); checkSession(); });
        document.getElementById('backToHomeFromLost').addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromFound').addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromGame').addEventListener('click', () => showPage(homePage));
        document.getElementById('searchLostBtn').addEventListener('click', () => loadLostItems(document.getElementById('lostSearchInput').value));

        // Load lost items logic (same as before)
        async function loadLostItems(searchTerm) {
            const container = document.getElementById('lostResults');
            container.innerHTML = '<p>🌀 LOADING...</p>';
            try {
                const items = await searchLostItems(searchTerm);
                if (items.length === 0) { container.innerHTML = '<p>No items found.</p>'; return; }
                container.innerHTML = items.map(item => {
                    const type = item.get('type');
                    let emoji = { electronic:'📱', personal:'🎒', clothing:'👕', documents:'🪪', keys:'🔑', bags:'👜' }[type] || '📌';
                    const photo = item.get('photo');
                    const photoUrl = photo ? photo.url() : null;
                    const contact = item.get('contactInfo') || '';
                    return `<div class="card">
                        <div style="display:flex; justify-content:space-between;"><span><strong>${emoji} ${type}</strong></span><span>${new Date(item.get('timeFound')).toLocaleDateString()}</span></div>
                        <div>🎨 ${item.get('color')} · 🏷️ ${item.get('model')}</div>
                        <div>✨ ${item.get('appearance')}</div>
                        <div>📍 ${item.get('locationFound')}</div>
                        ${photoUrl ? `<img src="${photoUrl}" style="max-width:100%; border-radius:16px; margin-top:8px;">` : ''}
                        <button class="verify-btn" data-id="${item.id}">🔐 VERIFY</button>
                        <button class="small-btn forgot-btn" data-contact="${contact.replace(/"/g, '&quot;')}">❓ DETAILS</button>
                        <div class="contact-info hidden" id="contact-${item.id}">${contact ? '📞 ' + contact : 'No contact'}</div>
                    </div>`;
                }).join('');
                document.querySelectorAll('.verify-btn').forEach(btn => btn.addEventListener('click', (e) => openVerifyPopup(e.target.dataset.id)));
                document.querySelectorAll('.forgot-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const id = e.target.closest('.card').querySelector('.verify-btn').dataset.id;
                    document.getElementById(`contact-${id}`).classList.toggle('hidden');
                }));
            } catch(e) { container.innerHTML = '<p>Error loading items.</p>'; }
        }

        // verification popup (simplified)
        const verifyPopup = document.getElementById('verifyPopup');
        let currentItemId = null;
        async function openVerifyPopup(itemId) {
            currentItemId = itemId;
            const q = await getVerificationQuestion(itemId);
            document.getElementById('verifyQuestionText').innerText = q || 'Question?';
            document.getElementById('verifyAnswerInput').value = '';
            verifyPopup.classList.remove('hidden');
        }
        document.getElementById('submitVerifyBtn')?.addEventListener('click', async () => {
            const ans = document.getElementById('verifyAnswerInput').value.trim();
            if (!ans) return;
            const res = await verifyItem(currentItemId, ans);
            document.getElementById('verifyMessage').innerText = res.message;
            if (res.success) {
                setTimeout(() => { verifyPopup.classList.add('hidden'); loadLostItems(''); }, 1000);
            }
        });
        document.getElementById('cancelVerifyBtn')?.addEventListener('click', () => verifyPopup.classList.add('hidden'));

        // found item submit
        document.getElementById('submitFoundBtn')?.addEventListener('click', async () => {
            const type = document.getElementById('foundType').value;
            const color = document.getElementById('foundColor').value.trim();
            const model = document.getElementById('foundModel').value.trim();
            const appearance = document.getElementById('foundAppearance').value.trim();
            const description = document.getElementById('foundDescription').value.trim();
            const time = document.getElementById('foundTime').value;
            const location = document.getElementById('foundLocation').value.trim();
            const veriQ = document.getElementById('foundVeriQuestion').value.trim();
            const veriA = document.getElementById('foundVeriAnswer').value.trim();
            const contactInfo = document.getElementById('foundContactInfo').value.trim();
            const photoFile = document.getElementById('foundPhoto').files[0];
            if (!color || !model || !time || !location || !veriQ || !veriA) {
                document.getElementById('foundMessage').innerText = 'Fill required fields.';
                return;
            }
            await createFoundItem({ type, color, model, appearance, description, timeFound: new Date(time), locationFound: location, verificationQuestion: veriQ, verificationAnswer: veriA, contactInfo, photoFile, photoName: photoFile?.name });
            document.getElementById('foundMessage').innerText = 'Item posted!';
            setTimeout(() => document.getElementById('foundMessage').innerText = '', 2000);
        });

        // dino game init (simplified - keep as is)
        (function initDino() {
            const cv = document.getElementById('dc'); if(!cv) return;
            const ctx = cv.getContext('2d');
            const scEl = document.getElementById('dsc'), hiEl = document.getElementById('dhi');
            const msgP = document.getElementById('dm');
            const W=700, H=130, GR=100;
            let d, ca, sc, hi=0, spd, st, lt, fs, raf;
            function reset(){ d={x:60,y:GR,w:22,h:26,vy:0,jmp:false,fr:0,ft:0}; ca=[]; sc=0; fs=0; spd=4; st='idle'; lt=null; }
            function jump(){ if(st==='idle'||st==='dead')start(); else if(!d.jmp){ d.vy=-11; d.jmp=true; } }
            function start(){ st='running'; d.jmp=false; d.vy=0; d.y=GR; ca=[]; sc=0; fs=0; spd=4; if(raf)cancelAnimationFrame(raf); raf=requestAnimationFrame(loop); }
            function loop(ts){
                if(document.getElementById('dinoGamePage').classList.contains('hidden')){ if(raf)cancelAnimationFrame(raf); st='idle'; return; }
                if(!lt)lt=ts; let dt=Math.min((ts-lt)/16.67,3); lt=ts;
                ctx.clearRect(0,0,W,H);
                d.vy+=0.6*dt; d.y+=d.vy*dt; if(d.y>=GR){ d.y=GR; d.vy=0; d.jmp=false; }
                d.ft+=dt; if(d.ft>8){ d.fr++; d.ft=0; }
                fs+=dt; if(fs>=5){ sc+=Math.floor(fs/5); fs%=5; }
                spd=4+sc*0.012;
                if(Math.random()<0.012*dt && (ca.length===0||ca[ca.length-1].x<W-180)) ca.push({x:W,w:10+Math.random()*8,h:20+Math.random()*22,y:GR+26-(20+Math.random()*22)});
                for(let i=ca.length-1;i>=0;i--){
                    ca[i].x-=spd*dt;
                    if(ca[i].x+ca[i].w<0){ca.splice(i,1);continue;}
                    if(d.x+d.w-4>ca[i].x+2 && d.x+4<ca[i].x+ca[i].w-2 && d.y+d.h>ca[i].y+2){
                        if(sc>hi){hi=sc;hiEl.innerText=hi;}
                        scEl.innerText=sc; st='dead'; msgP.innerText='GAME OVER'; raf=null; return;
                    }
                    ctx.fillStyle='#f39c12'; ctx.fillRect(ca[i].x,ca[i].y,ca[i].w,ca[i].h);
                }
                ctx.fillStyle='#f39c12'; ctx.fillRect(d.x,d.y,d.w,d.h); ctx.fillRect(d.x+d.w-6,d.y-6,10,8); ctx.fillStyle='#000'; ctx.fillRect(d.x+d.w+1,d.y-5,3,3);
                ctx.fillStyle='#f39c12'; if(!d.jmp){ ctx.fillRect(d.x+4,d.y+d.h,5,8); ctx.fillRect(d.x+12,d.y+d.h,5,d.fr%2?8:4); }else{ ctx.fillRect(d.x+4,d.y+d.h,5,6); ctx.fillRect(d.x+12,d.y+d.h,5,6); }
                ctx.fillRect(d.x-6,d.y+8,8,4);
                scEl.innerText=sc; raf=requestAnimationFrame(loop);
            }
            reset(); document.addEventListener('keydown',e=>{if(e.code==='Space' && !document.getElementById('dinoGamePage').classList.contains('hidden')){ e.preventDefault(); jump(); }});
            cv.addEventListener('click',jump);
            window.stopDinoGame = ()=>{ if(raf)cancelAnimationFrame(raf); st='idle'; };
        })();

        checkSession();
    });
</script>
