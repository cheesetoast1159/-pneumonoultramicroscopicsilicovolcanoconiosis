<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🔍 Lost & Found | Dramatic Returns</title>
    <script src="https://unpkg.com/parse@5.3.0/dist/parse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #16222e, #0f1a24);
            --card-bg: rgba(20, 28, 38, 0.92);
            --primary: #f39c12;
            --primary-dark: #e67e22;
            --primary-light: #f1c40f;
            --accent: #e74c3c;
            --accent-glow: #ff6b6b;
            --text: #f5f7fa;
            --text-light: #b0c4de;
            --border: rgba(255,215,0,0.2);
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.5);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.6);
            --shadow-lg: 0 25px 45px rgba(0,0,0,0.7);
            --radius-card: 28px;
            --radius-button: 20px;
            --transition-drama: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0f16;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* dramatic animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(243,156,18,0.03) 0px, rgba(243,156,18,0.03) 3px, transparent 3px, transparent 12px),
                        radial-gradient(circle at 70% 20%, rgba(231,76,60,0.15) 0%, rgba(0,0,0,0) 60%);
            animation: slowSpin 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            height: 90vh;
            max-height: 850px;
            background: rgba(10, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(243,156,18,0.3) inset;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease;
            animation: containerFloating 6s ease-in-out infinite;
        }

        @keyframes containerFloating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* geometric slash header */
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: linear-gradient(125deg, var(--primary), var(--accent));
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0 95%);
            z-index: 0;
            opacity: 0.9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .page {
            flex: 1;
            overflow-y: auto;
            padding: 28px 22px 35px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 2;
            scroll-behavior: smooth;
        }

        .page.hidden {
            display: none !important;
        }

        /* dramatic page entry */
        .page:not(.hidden) {
            animation: pageEnter 0.55s cubic-bezier(0.2, 1.1, 0.3, 1) forwards;
        }

        @keyframes pageEnter {
            0% { opacity: 0; transform: scale(0.92) rotateX(-10deg); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1) rotateX(0); filter: blur(0); }
        }

        h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 2px rgba(243,156,18,0.3); }
            100% { text-shadow: 0 0 12px rgba(243,156,18,0.8); }
        }

        /* dramatic cards */
        .card {
            background: rgba(25, 35, 50, 0.85);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(243,156,18,0.4);
            transition: var(--transition-drama);
            transform-origin: center;
            animation: cardPopIn 0.5s cubic-bezier(0.34, 1.3, 0.55, 1) backwards;
        }

        .card:hover {
            transform: scale(1.02) translateY(-10px) rotateX(2deg);
            box-shadow: 0 25px 35px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        @keyframes cardPopIn {
            0% { opacity: 0; transform: scale(0.7) rotateY(15deg); filter: blur(6px); }
            100% { opacity: 1; transform: scale(1) rotateY(0); filter: blur(0); }
        }

        /* explosive buttons */
        button {
            background: linear-gradient(95deg, var(--primary-dark), var(--primary));
            border: none;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 16px;
            border-radius: var(--radius-button);
            color: #0a0f16;
            cursor: pointer;
            transition: var(--transition-drama);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        button:active::after {
            width: 200%;
            height: 200%;
            opacity: 0;
        }

        button:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 28px rgba(0,0,0,0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.96);
        }

        .verify-btn {
            background: linear-gradient(95deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 4px 12px rgba(231,76,60,0.4);
        }

        .small-btn {
            background: #2c3e50;
            color: #f1c40f;
            font-size: 13px;
        }

        /* electric inputs */
        input, select, textarea {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid rgba(243,156,18,0.3);
            border-radius: 24px;
            font-size: 15px;
            transition: var(--transition-drama);
            background: rgba(0,0,0,0.6);
            color: white;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(243,156,18,0.3);
            transform: scale(1.01);
            background: #0f1722;
        }

        /* popup dramatic */
        .verify-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeInBoom 0.3s ease-out;
        }
        .verify-popup.hidden { display: none; }
        @keyframes fadeInBoom {
            0% { opacity: 0; backdrop-filter: blur(0); }
            100% { opacity: 1; backdrop-filter: blur(12px); }
        }
        .popup-content {
            background: #1a1f2c;
            border-radius: 56px 24px 56px 24px;
            padding: 32px 28px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 3px #f39c12 inset;
            animation: popExplode 0.4s cubic-bezier(0.34, 1.3, 0.55, 1);
        }
        @keyframes popExplode {
            0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            70% { transform: scale(1.05) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* dino game drama */
        .dino-game-wrapper {
            background: #000000aa;
            border-radius: 40px;
            padding: 20px;
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 0 0 3px #f39c12, 0 10px 25px black;
            transition: 0.2s;
        }
        canvas:active {
            transform: scale(0.98);
        }

        /* shake effect for wrong answer */
        @keyframes shakeNasty {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .shake {
            animation: shakeNasty 0.4s ease-in-out;
        }

        /* contact info with pulse */
        .contact-info {
            background: #2c1e0f;
            border-left: 8px solid #f39c12;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #ffdd99;
            animation: pulseGlow 1.5s infinite alternate;
        }
        @keyframes pulseGlow {
            from { box-shadow: 0 0 2px #f39c12; }
            to { box-shadow: 0 0 12px #f39c12; }
        }

        /* scrollbar */
        .page::-webkit-scrollbar { width: 6px; }
        .page::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        .page::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 10px; }

        @media (max-width: 480px) {
            .app-container { border-radius: 32px; }
            .page { padding: 20px 16px; }
            h2 { font-size: 26px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page">
        <h2><span class="emoji-icon">🔥</span> WELCOME BACK</h2>
        <div id="loginForm" style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="loginUsername" placeholder="👤 Username" autocomplete="username">
            <input type="password" id="loginPassword" placeholder="🔑 Password" autocomplete="current-password">
            <button id="signInBtn">⚡ SIGN IN</button>
            <button id="showSignUpBtn" style="background:#3a546d;">✨ CREATE ACCOUNT</button>
        </div>
        <div id="signUpForm" class="hidden" style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="signUpUsername" placeholder="👤 Choose username">
            <input type="password" id="signUpPassword" placeholder="🔑 Create password">
            <button id="signUpSubmitBtn">📝 SIGN UP</button>
            <button id="showLoginBtn" style="background:#3a546d;">⬅ BACK</button>
        </div>
        <p id="authMessage" style="color:#e74c3c; text-align:center; font-weight:bold;"></p>
    </div>

    <!-- HOME PAGE -->
    <div id="homePage" class="page hidden">
        <h2><span class="emoji-icon">🏆</span> DASHBOARD</h2>
        <p style="font-weight:bold;">Welcome, <strong id="displayUsername" style="color:#f39c12;">...</strong>!</p>
        <button id="goLostBtn"><span class="emoji-icon">🔎</span> LOST SOMETHING?</button>
        <button id="goFoundBtn"><span class="emoji-icon">📦</span> I FOUND AN ITEM</button>
        <button id="goDinoGameBtn" class="game-btn"><span class="emoji-icon">🦖</span> DINO JUMP</button>
        <button id="logoutFromHomeBtn" style="background:#9b2c1d;"><span class="emoji-icon">🚪</span> LOG OUT</button>
    </div>

    <!-- LOST PAGE -->
    <div id="lostPage" class="page hidden">
        <h2><span class="emoji-icon">🔎</span> SEARCH LOST ITEMS</h2>
        <div class="row" style="display:flex; gap:12px;">
            <input type="text" id="lostSearchInput" placeholder="🔍 Search by color, model, type..." style="flex:2;">
            <button id="searchLostBtn" style="flex:1;">FILTER</button>
        </div>
        <div id="lostResults" style="display:flex; flex-direction:column; gap:20px; flex:1; overflow-y:auto;"></div>
        <button id="backToHomeFromLost" style="background:#2c3e50;">⬅ BACK TO HOME</button>
    </div>

    <!-- FOUND PAGE -->
    <div id="foundPage" class="page hidden">
        <h2><span class="emoji-icon">📦</span> REPORT FOUND ITEM</h2>
        <select id="foundType">
            <option value="electronic">📱 Electronic</option>
            <option value="personal">🎒 Personal Belongings</option>
            <option value="clothing">👕 Clothing</option>
            <option value="documents">🪪 Documents</option>
            <option value="keys">🔑 Keys</option>
            <option value="bags">👜 Bags</option>
            <option value="other">📌 Other</option>
        </select>
        <input type="text" id="foundColor" placeholder="🎨 Color">
        <input type="text" id="foundModel" placeholder="🏷️ Model/Brand">
        <input type="text" id="foundAppearance" placeholder="✨ Appearance (stickers, scratches)">
        <textarea id="foundDescription" placeholder="📝 Additional description" rows="2"></textarea>
        <input type="datetime-local" id="foundTime">
        <input type="text" id="foundLocation" placeholder="📍 Location found">
        <div id="verificationSection">
            <label style="color:#f1c40f;">🔐 VERIFICATION (private)</label>
            <input type="text" id="foundVeriQuestion" placeholder="Question (e.g., Wallpaper description)">
            <input type="text" id="foundVeriAnswer" placeholder="Answer (secret)">
        </div>
        <input type="text" id="foundContactInfo" placeholder="📞 Your contact (optional)">
        <div class="row">
            <label>📸 Photo</label>
            <input type="file" id="foundPhoto" accept="image/*">
        </div>
        <button id="submitFoundBtn">✅ SUBMIT ITEM</button>
        <button id="backToHomeFromFound" style="background:#2c3e50;">⬅ BACK</button>
        <p id="foundMessage" style="color:#f1c40f;"></p>
    </div>

    <!-- DINO GAME PAGE -->
    <div id="dinoGamePage" class="page hidden">
        <h2><span class="emoji-icon">🦖</span> DINO JUMP</h2>
        <p>🔥 TAP / SPACE — DRAMATIC JUMPS!</p>
        <div class="dino-game-wrapper">
            <div class="dino-score-row" style="display:flex; justify-content:space-between;">
                <span>🏆 HI <span id="dhi">0</span></span>
                <span>⭐ <span id="dsc">0</span></span>
            </div>
            <canvas id="dc" width="700" height="130"></canvas>
            <p class="dino-msg" id="dm" style="text-align:center;">PRESS SPACE / TAP TO START</p>
        </div>
        <button id="backToHomeFromGame" style="background:#2c3e50;">⬅ BACK TO HOME</button>
    </div>

    <!-- VERIFY POPUP -->
    <div id="verifyPopup" class="verify-popup hidden">
        <div class="popup-content">
            <h3 style="color:#f39c12;">🔐 VERIFICATION</h3>
            <p id="verifyQuestionText"></p>
            <p id="verifyStatusMessage" style="color:#e74c3c;"></p>
            <input type="text" id="verifyAnswerInput" placeholder="Your answer">
            <button id="submitVerifyBtn">✅ CONFIRM</button>
            <button id="cancelVerifyBtn" style="background:#555;">CANCEL</button>
            <p id="verifyMessage"></p>
        </div>
    </div>
</div>

<script src="backend.js"></script>
<script src="login.js"></script>
<script>
    (function() {
        // Dramatic shake effect for wrong answers
        function shakeElement(el) {
            if (!el) return;
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 500);
        }
        // Burst effect for buttons (adds temporary glow)
        function burstEffect(btn) {
            btn.style.transform = 'scale(0.96)';
            setTimeout(() => { btn.style.transform = ''; }, 150);
        }

        // Attach burst + ripple to all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                burstEffect(btn);
                // ripple
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255,255,200,0.8)';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.5s, opacity 0.5s';
                ripple.style.pointerEvents = 'none';
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                btn.style.position = 'relative';
                btn.style.overflow = 'hidden';
                btn.appendChild(ripple);
                requestAnimationFrame(() => {
                    ripple.style.transform = 'scale(30)';
                    ripple.style.opacity = '0';
                });
                setTimeout(() => ripple.remove(), 500);
            });
        });
    })();

    // ========== MAIN APP LOGIC ==========
    document.addEventListener('DOMContentLoaded', () => {
        const loginPage = document.getElementById('loginPage');
        const homePage = document.getElementById('homePage');
        const lostPage = document.getElementById('lostPage');
        const foundPage = document.getElementById('foundPage');
        const dinoGamePage = document.getElementById('dinoGamePage');
        const verifyPopup = document.getElementById('verifyPopup');
        const authMessage = document.getElementById('authMessage');
        let currentVerifyingItemId = null;

        const allPages = [loginPage, homePage, lostPage, foundPage, dinoGamePage];

        function showPage(page) {
            if (dinoGamePage && !dinoGamePage.classList.contains('hidden') && page !== dinoGamePage) {
                if (typeof window.stopDinoGame === 'function') window.stopDinoGame();
            }
            allPages.forEach(p => p.classList.add('hidden'));
            page.classList.remove('hidden');
            page.scrollTop = 0;
        }

        function checkSession() {
            if (auth.getCurrentUser()) {
                document.getElementById('displayUsername').textContent = auth.getCurrentUser().getUsername();
                showPage(homePage);
            } else {
                showPage(loginPage);
            }
        }

        // Toggle forms
        document.getElementById('showSignUpBtn')?.addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signUpForm').classList.remove('hidden');
            authMessage.textContent = '';
        });
        document.getElementById('showLoginBtn')?.addEventListener('click', () => {
            document.getElementById('signUpForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            authMessage.textContent = '';
        });

        document.getElementById('signInBtn')?.addEventListener('click', async () => {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value;
            if (!u || !p) return authMessage.textContent = '⚠️ Fill both fields.';
            try {
                await auth.logIn(u, p);
                checkSession();
            } catch (e) {
                authMessage.textContent = '❌ ' + e.message;
                shakeElement(authMessage);
            }
        });

        document.getElementById('signUpSubmitBtn')?.addEventListener('click', async () => {
            const u = document.getElementById('signUpUsername').value.trim();
            const p = document.getElementById('signUpPassword').value;
            if (!u || !p) return authMessage.textContent = '⚠️ Fill both fields.';
            try {
                await auth.signUp(u, p);
                checkSession();
            } catch (e) {
                authMessage.textContent = '❌ ' + e.message;
                shakeElement(authMessage);
            }
        });

        // Navigation
        document.getElementById('goLostBtn')?.addEventListener('click', () => { showPage(lostPage); loadLostItems(''); });
        document.getElementById('goFoundBtn')?.addEventListener('click', () => showPage(foundPage));
        document.getElementById('goDinoGameBtn')?.addEventListener('click', () => showPage(dinoGamePage));
        document.getElementById('logoutFromHomeBtn')?.addEventListener('click', async () => {
            if (typeof window.stopDinoGame === 'function') window.stopDinoGame();
            await auth.logOut();
            checkSession();
        });
        document.getElementById('backToHomeFromLost')?.addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromFound')?.addEventListener('click', () => showPage(homePage));
        document.getElementById('backToHomeFromGame')?.addEventListener('click', () => showPage(homePage));
        document.getElementById('searchLostBtn')?.addEventListener('click', () => {
            const term = document.getElementById('lostSearchInput').value;
            loadLostItems(term);
        });

        async function loadLostItems(searchTerm = '') {
            const container = document.getElementById('lostResults');
            container.innerHTML = '<p style="text-align:center;">🌀 LOADING...</p>';
            try {
                const items = await searchLostItems(searchTerm);
                if (items.length === 0) {
                    container.innerHTML = '<p>😔 No matching items found.</p>';
                    return;
                }
                container.innerHTML = items.map(item => {
                    const type = item.get('type'); let typeEmoji = '📌';
                    if (type === 'electronic') typeEmoji = '📱';
                    else if (type === 'personal') typeEmoji = '🎒';
                    else if (type === 'clothing') typeEmoji = '👕';
                    else if (type === 'documents') typeEmoji = '🪪';
                    else if (type === 'keys') typeEmoji = '🔑';
                    else if (type === 'bags') typeEmoji = '👜';
                    const photo = item.get('photo');
                    const photoUrl = photo ? photo.url() : null;
                    const description = item.get('description') || '';
                    const contact = item.get('contactInfo') || '';
                    return `
                        <div class="card" style="animation-delay: ${Math.random() * 0.2}s">
                            <div style="display:flex; justify-content:space-between;">
                                <span><strong>${typeEmoji} ${type}</strong></span>
                                <span>🕒 ${item.get('timeFound')?.toLocaleString?.() || item.get('timeFound')}</span>
                            </div>
                            <div>🎨 ${item.get('color')} · 🏷️ ${item.get('model')}</div>
                            <div>✨ ${item.get('appearance')}</div>
                            ${description ? `<div>📝 ${description}</div>` : ''}
                            <div>📍 ${item.get('locationFound')}</div>
                            ${photoUrl ? `<img src="${photoUrl}" style="max-width:100%; border-radius:20px; margin-top:8px;">` : ''}
                            <button class="verify-btn" data-id="${item.id}">🔐 VERIFY & CLAIM</button>
                            <button class="small-btn forgot-btn" data-contact="${contact.replace(/"/g, '&quot;')}">❓ FORGOT DETAILS?</button>
                            <div class="contact-info hidden" id="contact-${item.id}">${contact ? `📞 CONTACT: ${contact}` : '⚠️ No contact provided.'}</div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.verify-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        currentVerifyingItemId = e.target.dataset.id;
                        openVerifyPopup(currentVerifyingItemId);
                    });
                });
                document.querySelectorAll('.forgot-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const card = e.target.closest('.card');
                        const id = card.querySelector('.verify-btn').dataset.id;
                        const contactDiv = document.getElementById(`contact-${id}`);
                        if (contactDiv) contactDiv.classList.toggle('hidden');
                    });
                });
            } catch (e) {
                container.innerHTML = `<p style="color:red;">💥 ERROR: ${e.message}</p>`;
            }
        }

        async function openVerifyPopup(itemId) {
            const statusEl = document.getElementById('verifyStatusMessage');
            const answerInput = document.getElementById('verifyAnswerInput');
            const questionEl = document.getElementById('verifyQuestionText');
            const msgEl = document.getElementById('verifyMessage');
            statusEl.textContent = '';
            msgEl.textContent = '';
            answerInput.value = '';
            answerInput.disabled = false;
            document.getElementById('submitVerifyBtn').disabled = false;
            try {
                const query = new Parse.Query(Parse.Object.extend("LostItem"));
                const item = await query.get(itemId);
                if (item.get("verificationBlocked")) {
                    statusEl.textContent = '⛔ PERMANENTLY BLOCKED.';
                    answerInput.disabled = true;
                    document.getElementById('submitVerifyBtn').disabled = true;
                } else {
                    const nextAllowed = item.get("nextAttemptAllowedAt");
                    if (nextAllowed && new Date() < new Date(nextAllowed)) {
                        const diffMs = new Date(nextAllowed) - new Date();
                        const hrs = Math.floor(diffMs / 3600000);
                        const mins = Math.floor((diffMs % 3600000) / 60000);
                        statusEl.textContent = `⏳ COOLDOWN: ${hrs}h ${mins}m`;
                        answerInput.disabled = true;
                        document.getElementById('submitVerifyBtn').disabled = true;
                    } else {
                        const attempts = item.get("verificationAttempts") || 0;
                        if (attempts >= 9) {
                            statusEl.textContent = '🔒 TOO MANY ATTEMPTS – BLOCKED';
                            answerInput.disabled = true;
                            document.getElementById('submitVerifyBtn').disabled = true;
                        } else if (attempts >= 6) statusEl.textContent = `⚠️ ${attempts} WRONG. NEXT LOCK: 5H`;
                        else if (attempts >= 3) statusEl.textContent = `⚠️ ${attempts} WRONG. COOLDOWN SOON`;
                    }
                }
                const question = await getVerificationQuestion(itemId);
                questionEl.textContent = '🔐 ' + (question || 'No question set');
                verifyPopup.classList.remove('hidden');
            } catch (e) { alert('Error: ' + e.message); }
        }

        document.getElementById('cancelVerifyBtn')?.addEventListener('click', () => {
            verifyPopup.classList.add('hidden');
            currentVerifyingItemId = null;
        });

        document.getElementById('submitVerifyBtn')?.addEventListener('click', async () => {
            if (!currentVerifyingItemId) return;
            const answer = document.getElementById('verifyAnswerInput').value.trim();
            if (!answer) return;
            const statusEl = document.getElementById('verifyStatusMessage');
            const msgEl = document.getElementById('verifyMessage');
            const answerInput = document.getElementById('verifyAnswerInput');
            const submitBtn = document.getElementById('submitVerifyBtn');
            try {
                const result = await verifyItem(currentVerifyingItemId, answer);
                msgEl.textContent = result.message || '';
                if (result.success) {
                    answerInput.disabled = true;
                    submitBtn.disabled = true;
                    setTimeout(() => {
                        verifyPopup.classList.add('hidden');
                        loadLostItems(document.getElementById('lostSearchInput').value);
                    }, 1500);
                } else {
                    shakeElement(verifyPopup.querySelector('.popup-content'));
                    if (result.blocked) {
                        statusEl.textContent = '⛔ PERMANENTLY BLOCKED';
                        answerInput.disabled = true;
                        submitBtn.disabled = true;
                    } else if (result.cooldownEnd) {
                        const diffMs = new Date(result.cooldownEnd) - new Date();
                        if (diffMs > 0) {
                            const hrs = Math.floor(diffMs / 3600000);
                            const mins = Math.floor((diffMs % 3600000) / 60000);
                            statusEl.textContent = `⏳ COOLDOWN: ${hrs}h ${mins}m`;
                        }
                        answerInput.disabled = true;
                        submitBtn.disabled = true;
                    } else {
                        const query = new Parse.Query(Parse.Object.extend("LostItem"));
                        const item = await query.get(currentVerifyingItemId);
                        const attempts = item.get("verificationAttempts") || 0;
                        if (attempts >= 9) statusEl.textContent = 'BLOCKED.';
                        else if (attempts >= 6) statusEl.textContent = `⚠️ ${attempts}/9 WRONG, 5H LOCK SOON`;
                        else if (attempts >= 3) statusEl.textContent = `⚠️ ${attempts}/9 WRONG, 3H COOLDOWN SOON`;
                        else statusEl.textContent = `❌ WRONG. ${3 - attempts} ATTEMPTS LEFT`;
                    }
                }
            } catch (e) { msgEl.textContent = 'ERROR: ' + e.message; }
        });

        document.getElementById('foundType')?.addEventListener('change', (e) => {
            const type = e.target.value;
            const qInput = document.getElementById('foundVeriQuestion');
            if (type === 'electronic') qInput.value = 'What is the wallpaper of this device?';
            else qInput.value = '';
        });
        document.getElementById('foundType')?.dispatchEvent(new Event('change'));

        document.getElementById('submitFoundBtn')?.addEventListener('click', async () => {
            const type = document.getElementById('foundType').value;
            const color = document.getElementById('foundColor').value.trim();
            const model = document.getElementById('foundModel').value.trim();
            const appearance = document.getElementById('foundAppearance').value.trim();
            const description = document.getElementById('foundDescription').value.trim();
            const time = document.getElementById('foundTime').value;
            const location = document.getElementById('foundLocation').value.trim();
            const veriQ = document.getElementById('foundVeriQuestion').value.trim();
            const veriA = document.getElementById('foundVeriAnswer').value.trim();
            const contactInfo = document.getElementById('foundContactInfo').value.trim();
            const photoInput = document.getElementById('foundPhoto');
            const msg = document.getElementById('foundMessage');
            if (!color || !model || !time || !location || !veriQ || !veriA) {
                msg.textContent = '❌ FILL ALL REQUIRED FIELDS!';
                shakeElement(msg);
                return;
            }
            let photoFile = null, photoName = '';
            if (photoInput.files.length > 0) {
                photoFile = photoInput.files[0];
                photoName = photoFile.name;
            }
            try {
                await createFoundItem({ type, color, model, appearance, description, timeFound: new Date(time), locationFound: location, verificationQuestion: veriQ, verificationAnswer: veriA, contactInfo, photoFile, photoName });
                msg.textContent = '✅ ITEM POSTED! THANK YOU.';
                document.getElementById('foundColor').value = '';
                document.getElementById('foundModel').value = '';
                document.getElementById('foundAppearance').value = '';
                document.getElementById('foundDescription').value = '';
                document.getElementById('foundLocation').value = '';
                document.getElementById('foundVeriAnswer').value = '';
                document.getElementById('foundContactInfo').value = '';
                document.getElementById('foundPhoto').value = '';
                document.getElementById('foundType').dispatchEvent(new Event('change'));
                setTimeout(() => msg.textContent = '', 3000);
            } catch (e) { msg.textContent = '❌ ERROR: ' + e.message; shakeElement(msg); }
        });

        checkSession();
    });
</script>

<!-- DINO GAME (dramatic version) -->
<script>
    (function() {
        const cv = document.getElementById('dc');
        if (!cv) return;
        const ctx = cv.getContext('2d');
        const scEl = document.getElementById('dsc');
        const hiEl = document.getElementById('dhi');
        const msg = document.getElementById('dm');
        const gamePage = document.getElementById('dinoGamePage');
        const W = 700, H = 130, GR = 100;
        let d, ca, sc, hi = 0, spd, st, lt, fs;
        let currentRaf = null;
        function reset() {
            d = { x: 60, y: GR, w: 22, h: 26, vy: 0, jmp: false, fr: 0, ft: 0 };
            ca = []; sc = 0; fs = 0; spd = 4; st = 'idle'; lt = null;
        }
        function jump() {
            if (!gamePage || !gamePage.classList.contains('hidden')) {
                if (st === 'idle' || st === 'dead') { start(); return; }
                if (!d.jmp) { d.vy = -11; d.jmp = true; }
            }
        }
        function start() {
            st = 'running'; msg.textContent = '⚡ RUNNING!'; d.jmp = false; d.vy = 0; d.y = GR; ca = []; sc = 0; fs = 0; spd = 4; lt = null;
            if (currentRaf) cancelAnimationFrame(currentRaf);
            currentRaf = requestAnimationFrame(loop);
        }
        function loop(ts) {
            if (gamePage && gamePage.classList.contains('hidden')) {
                if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = null; }
                st = 'idle'; msg.textContent = 'PRESS SPACE / TAP TO START';
                return;
            }
            if (!lt) lt = ts;
            const dt = Math.min((ts - lt) / 16.67, 3);
            lt = ts;
            ctx.clearRect(0, 0, W, H);
            const col = '#f39c12';
            d.vy += 0.6 * dt;
            d.y += d.vy * dt;
            if (d.y >= GR) { d.y = GR; d.vy = 0; d.jmp = false; }
            d.ft += dt;
            if (d.ft > 8) { d.fr++; d.ft = 0; }
            fs += dt;
            if (fs >= 5) { sc += Math.floor(fs / 5); fs %= 5; }
            spd = 4 + sc * 0.012;
            if (Math.random() < 0.012 * dt && (ca.length === 0 || ca[ca.length-1].x < W-180)) {
                const h = 20 + Math.random() * 22, w = 10 + Math.random() * 8;
                ca.push({ x: W, w, h, y: GR + 26 - h });
            }
            for (let i=ca.length-1; i>=0; i--) {
                ca[i].x -= spd * dt;
                if (ca[i].x + ca[i].w < 0) { ca.splice(i,1); continue; }
                if (d.x + d.w - 4 > ca[i].x + 2 && d.x + 4 < ca[i].x + ca[i].w - 2 && d.y + d.h > ca[i].y + 2) {
                    st = 'dead';
                    if (sc > hi) { hi = sc; hiEl.textContent = hi; }
                    scEl.textContent = sc;
                    msg.textContent = '💀 GAME OVER — TAP / SPACE TO RESTART';
                    currentRaf = null;
                    return;
                }
                ctx.fillStyle = col;
                ctx.fillRect(ca[i].x, ca[i].y, ca[i].w, ca[i].h);
                ctx.fillRect(ca[i].x-4, ca[i].y+6, 4, 4);
                ctx.fillRect(ca[i].x+ca[i].w, ca[i].y+8, 4, 4);
            }
            ctx.fillStyle = col;
            ctx.fillRect(d.x, d.y, d.w, d.h);
            ctx.fillRect(d.x+d.w-6, d.y-6, 10, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(d.x+d.w+1, d.y-5, 3, 3);
            ctx.fillStyle = col;
            if (!d.jmp) {
                ctx.fillRect(d.x+4, d.y+d.h, 5, 8);
                ctx.fillRect(d.x+12, d.y+d.h, 5, d.fr%2===0?8:4);
            } else {
                ctx.fillRect(d.x+4, d.y+d.h, 5, 6);
                ctx.fillRect(d.x+12, d.y+d.h, 5, 6);
            }
            ctx.fillRect(d.x-6, d.y+8, 8, 4);
            scEl.textContent = sc;
            currentRaf = requestAnimationFrame(loop);
        }
        window.stopDinoGame = function() { if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = null; } st='idle'; msg.textContent='PRESS SPACE / TAP TO START'; };
        reset();
        document.addEventListener('keydown', e => { if (e.code==='Space' && gamePage && !gamePage.classList.contains('hidden')) { e.preventDefault(); jump(); } });
        cv.addEventListener('click', jump);
        cv.addEventListener('touchstart', e => { if (gamePage && !gamePage.classList.contains('hidden')) { e.preventDefault(); jump(); } });
    })();
</script>
